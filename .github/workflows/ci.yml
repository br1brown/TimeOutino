name: CI

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest   # il csproj ha EnableWindowsTargeting=true, quindi builda anche su Linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore TimeOutino.csproj

      - name: Build
        run: dotnet build TimeOutino.csproj -c Release --no-restore
