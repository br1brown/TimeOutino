name: Release

# Si attiva quando pubblichi un tag di versione, es: git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write   # necessario a Velopack per creare la GitHub Release

jobs:
  release:
    runs-on: windows-latest   # serve Windows per pubblicare l'app WinForms self-contained
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Versione dal tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish (self-contained win-x64)
        run: >
          dotnet publish TimeOutino.csproj -c Release -r win-x64 --self-contained true
          -o publish -p:Version=${{ steps.ver.outputs.version }}

      - name: Pacchetto e release Velopack
        shell: pwsh
        run: |
          dotnet tool install -g vpk --version 1.2.0
          vpk download github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }}
          vpk pack -u TimeOutino -v ${{ steps.ver.outputs.version }} -p publish -e TimeOutino.exe
          vpk upload github --repoUrl https://github.com/${{ github.repository }} --publish --releaseName "TimeOutino ${{ steps.ver.outputs.version }}" --tag ${{ github.ref_name }} --token ${{ secrets.GITHUB_TOKEN }}
